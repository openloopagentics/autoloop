name: Autoloop
options:
  bundleIdPrefix: com.openloopagentics.autoloop
  deploymentTarget:
    iOS: "16.0"
configFiles:
  Debug: Config/Autoloop.xcconfig
  Release: Config/Autoloop.xcconfig
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.0.0
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0
targets:
  Autoloop:
    type: application
    platform: iOS
    sources:
      - path: Autoloop
      # GoogleService-Info.plist is a resource (xcodegen has no top-level `resources` key —
      # it must be a source with buildPhase: resources). optional → generates without the secret.
      - path: Config/GoogleService-Info.plist
        buildPhase: resources
        optional: true
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: MarkdownUI
        product: MarkdownUI
    info:
      path: Autoloop/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # actool's partial plist isn't merged into a static INFOPLIST_FILE, so set it explicitly.
        CFBundleIconName: AppIcon
        # xcodegen otherwise hardcodes these; reference the build settings so version/build track.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        API_BASE_URL: $(API_BASE_URL)
        # App uses only standard HTTPS — declare no non-exempt encryption so TestFlight
        # uploads skip the export-compliance prompt.
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.609946116962-794sm2nnf221g32sohthcsd2qs84v104
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openloopagentics.autoloop
        DEVELOPMENT_TEAM: RL4G6WZ65Q
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"        # iPhone only (iOS-first; drops iPad asset reqs)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.0"      # version testers see
        CURRENT_PROJECT_VERSION: "6"    # bump every TestFlight upload
  AutoloopTests:
    type: bundle.unit-test
    platform: iOS
    sources: [AutoloopTests]
    dependencies:
      - target: Autoloop
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
